# workflow describes variables and how to output the different context objects
name: Variables and Context
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet.'
        default: 'World'
        required: true
#define environmental variables
env:
  VAR1: myworkflowvar1
  VAR2: myworkflowvar2
  VAR3: myworkflowvar3

jobs:
  job1:
    name: job 1
    runs-on: ubuntu-latest
    steps:
      - name: Dump Github Context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }} #collect all github objects created and used for workflows runs
        run: echo "$GITHUB_CONTEXT" #display all github objects
  job2:
    name: job 2
    runs-on: ubuntu-latest
    #create outputs from different steps in this job to make it referenceablefrom other future jobs
    outputs:
      output1: ${{ steps.step1.outputs.step1value }} #we can reference an output using: steps.stepid.outputs.stepvariable
      output2: ${{ steps.step2.outputs.step2value }} #stepid=step2; stepvariable=step2value

    steps:
      - name: step 1
        id: step1 #id value that we can reference
        run: echo "step1value=hello" >> $GITHUB_OUTPUT #step1value if a variable of id step1 

      - name: step 2
        id: step2 #id value that we can reference
        run: echo "step2value=hello" >> $GITHUB_OUTPUT

  job3: #we access output variables from job2
    name: job3
    runs-on: ubuntu-latest
    needs: job2 #job3 needs job2 to complete w/o errors
    steps:
      - run: echo ${{ needs.job2.outputs.output1 }} ${{ needs.job2.outputs.output2 }}
        
 
