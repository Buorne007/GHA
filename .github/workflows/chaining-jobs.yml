#this workflow joins multiple jobs together and controls when the action will run.
#Shows how we can make one job dependent on another.
#This workflow is manually triggered
name: Chaining Jobs
on:
  workflow_dispatch:
    inputs:
      run-job-3:
        description: "Run job 3"
        required: true
        type: boolean

jobs:
  job-1:
    name: Job 1
    runs-on: ubuntu-latest
    steps:
      - name: Output for job 1
        run: |
          echo "Hello from Job 1. Run Job 3 equals ${{ github.event.inputs.run-job-3 }}"
  
  job-2:
    name: Job 2
    runs-on: ubuntu-latest
    needs:
      - job-1 # we state that job 2 needs job 1 to be executed & complete before it can run. Job 2 will be put on a wait state until job 1 is complete 
    steps:
      - name: Output for job 2
        run: echo "Hello from Job 2."
      - name: Make Job 2 fail
        run: exit 1

  job-3:
    name: Job 3
    if: github.event.inputs.run-job-3 == 'true' #run only if the user says they want to run job 3
    runs-on: ubuntu-latest
    needs: job-1 # wait for job 1 to complete before it runs
    steps:
      - name: Output for job 3
        run: echo "Hello from Job 3."

  job-4:
    name: Job 4
    runs-on: ubuntu-latest
    if: always() #tells job 4 to always run irrespective of if job 2 or 3 runs
    needs: #all conditions must be true. i.e job-2 and job-3 must not just run but pass.
      - job-2
      - job-3
    steps:
      - name: Output for job 4
        run: echo "Hello from Job 4."
        
    
